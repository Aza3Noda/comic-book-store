spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comicdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update

# Error detail
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# Suppress open-in-view warning
spring.jpa.open-in-view=false

# JWT / Admin / CORS / Cloudinary are configured via environment variables:
# JWT_SECRET (required), JWT_ISSUER, JWT_EXPIRES_MIN
# ADMIN_USERNAME, ADMIN_PASSWORD_HASH (preferred) or ADMIN_PASSWORD
# FRONTEND_ORIGIN (e.g. https://your-app.vercel.app)
# CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET